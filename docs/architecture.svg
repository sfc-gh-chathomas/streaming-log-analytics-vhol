<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- vertical connectors -->
  <g stroke="#9CA3AF" stroke-width="2" fill="none">
    <line x1="280" y1="76"  x2="280" y2="114" marker-end="url(#arrow)"/>
    <line x1="280" y1="172" x2="280" y2="210" marker-end="url(#arrow)"/>
    <line x1="280" y1="268" x2="280" y2="306" marker-end="url(#arrow)"/>
    <line x1="280" y1="364" x2="280" y2="402" marker-end="url(#arrow)"/>
    <line x1="280" y1="460" x2="160" y2="536" marker-end="url(#arrow)"/>
    <line x1="280" y1="460" x2="400" y2="536" marker-end="url(#arrow)"/>
  </g>

  <!-- arrow labels -->
  <g font-size="11" fill="#6B7280" text-anchor="middle">
    <text x="392" y="99">Snowpipe Streaming &#183; Python SDK</text>
    <text x="345" y="195">Dynamic Table</text>
    <text x="345" y="291">Dynamic Table</text>
    <text x="352" y="387">Interactive Table</text>
    <text x="150" y="505">+ semantic view</text>
    <text x="405" y="505">reads serving</text>
  </g>

  <!-- boxes -->
  <g stroke-width="2">
    <rect x="140" y="20"  width="280" height="56" rx="10" fill="#EEF2F7" stroke="#64748B"/>
    <rect x="140" y="116" width="280" height="56" rx="10" fill="#F6E7D6" stroke="#B87333"/>
    <rect x="140" y="212" width="280" height="56" rx="10" fill="#ECEEF1" stroke="#94A3B8"/>
    <rect x="140" y="308" width="280" height="56" rx="10" fill="#FBEFC6" stroke="#D4A017"/>
    <rect x="140" y="404" width="280" height="56" rx="10" fill="#E1F3FB" stroke="#29B5E8"/>
    <rect x="40"  y="536" width="220" height="60" rx="10" fill="#EDE7FB" stroke="#7C3AED"/>
    <rect x="300" y="536" width="220" height="60" rx="10" fill="#D8F3E6" stroke="#10B981"/>
  </g>

  <!-- box titles -->
  <g text-anchor="middle" fill="#111827">
    <text x="280" y="44"  font-size="14" font-weight="700">Snowmart services</text>
    <text x="280" y="62"  font-size="11" fill="#4B5563">8 microservices emit logs</text>

    <text x="280" y="140" font-size="14" font-weight="700">BRONZE_LOGS</text>
    <text x="280" y="158" font-size="11" fill="#4B5563">raw JSON &#183; seconds fresh</text>

    <text x="280" y="236" font-size="14" font-weight="700">SILVER_LOGS</text>
    <text x="280" y="254" font-size="11" fill="#4B5563">typed &#183; deduped &#183; cleaned</text>

    <text x="280" y="332" font-size="14" font-weight="700">GOLD_SERVICE_HEALTH</text>
    <text x="280" y="350" font-size="11" fill="#4B5563">per-service, per-minute metrics</text>

    <text x="280" y="428" font-size="14" font-weight="700">SERVICE_HEALTH_SERVING</text>
    <text x="280" y="446" font-size="11" fill="#4B5563">Interactive Table &#183; low-latency</text>

    <text x="150" y="562" font-size="14" font-weight="700">SNOWMART_SRE</text>
    <text x="150" y="580" font-size="11" fill="#4B5563">AI SRE co-pilot</text>

    <text x="410" y="562" font-size="14" font-weight="700">Streamlit dashboard</text>
    <text x="410" y="580" font-size="11" fill="#4B5563">live freshness + health</text>
  </g>
</svg>
